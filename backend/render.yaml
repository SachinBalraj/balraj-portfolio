services:
  - type: web
    name: balraj-portfolio-api
    runtime: node
    repo: https://github.com/SachinBalraj/balraj-portfolio
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: "https://balraj-portfolio-iota.vercel.app"
      - key: CSRF_SECRET
        sync: false
      - key: CSP_CONNECT_SRC
        sync: false
      - key: CSP_IMG_SRC
        sync: false
